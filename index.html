<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App | JavaScript Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
</head>

<body>
  <div class="cloud-container"></div>
  <div class="rain-container"></div>
  <div class="snow-container"></div>
  <div class="sun-container"></div>
  <div class="app">
    <h1>Weather App</h1>
    <!--日付-->
    <p class="date">2026/01/01</p>
    <!--検索-->
  <div class="search-area">
    <input type="text" id="search" placeholder="地域検索">
    <button id="search-btn">検索</button>
    <button id="gps-btn">📍現在地</button>
  </div> 

  <ul id="suggest"></ul>

  <div class="history-box">
    <div class="history-header">
     <p>最近検索</p>
     <button id="clear-history">削除</button>
    </div>
    <ul id="history"></ul>
  </div>
    
  <div id="output"></div>

  <div id="status">
    <div class="loader"></div>
    <p>読み込み中...</p>
  </div>
  <div id="result"></div>
  <!--表示エリア-->
  <div class="weather-box">
    <div id="date-time"></div>
    <div id="weather"></div>
    <div id="forecast"></div><!-- 5日間天気予報 -->
    <div id="precipitation"></div>
    <div id="temperature"></div>
    <div id="airflow"></div>
  </div>

</div>
</body>

</html>
